<app-navbar></app-navbar>

<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Loan</h1>
    <h1 *ngIf="form.data.id>0" align="center" style="margin-bottom: 5px; color: navy">Update Loan</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left">LoanAmount<span style="color: red">*</span></th>
            <td><input type="text" name="loanAmount" [(ngModel)]="form.data.loanAmount" placeholder="Enter LoanAmount"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.loanAmount}}</td>
        </tr>

        <tr>
            <th align="left">InterestRate<span style="color: red">*</span></th>
            <td><input type="text" name="interestRate" [(ngModel)]="form.data.interestRate" placeholder="Enter interestRate"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.interestRate}}</td>
        </tr>

        <tr>
            <th align="left">IssueDate<span style="color: red">*</span></th>
            <td><input type="date" name="issueDate" [(ngModel)]="form.data.issueDate" placeholder="Enter issueDate"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.issueDate}}</td>
        </tr>

        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
                <!-- <button (click)="forward('/loanlist')">list</button> -->
            </td>
        </tr>
    </table>
</div>

<app-footer></app-footer>
